name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno test --allow-env --allow-read --allow-write --allow-run

  build:
    needs: test
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: hive-darwin-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: hive-darwin-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: hive-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Compile
        run: deno compile --allow-env --allow-read --allow-write --allow-run --allow-net --target ${{ matrix.target }} --output ${{ matrix.artifact }} cli.ts
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hive-darwin-arm64
            hive-darwin-x64
            hive-linux-x64
          generate_release_notes: true

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Compute sha256 hashes
        id: hashes
        run: |
          echo "arm64=$(sha256sum hive-darwin-arm64 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "x64=$(sha256sum hive-darwin-x64 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux=$(sha256sum hive-linux-x64 | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          FORMULA=$(cat <<'RUBY'
          class HiveCli < Formula
            desc "Multi-session Claude Code coordinator"
            homepage "https://github.com/canderson22/hive"
            version "__VERSION__"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/canderson22/hive/releases/download/v#{version}/hive-darwin-arm64"
                sha256 "__SHA_ARM64__"

                def install
                  bin.install "hive-darwin-arm64" => "hive"
                end
              elsif Hardware::CPU.intel?
                url "https://github.com/canderson22/hive/releases/download/v#{version}/hive-darwin-x64"
                sha256 "__SHA_X64__"

                def install
                  bin.install "hive-darwin-x64" => "hive"
                end
              end
            end

            on_linux do
              url "https://github.com/canderson22/hive/releases/download/v#{version}/hive-linux-x64"
              sha256 "__SHA_LINUX__"

              def install
                bin.install "hive-linux-x64" => "hive"
              end
            end

            test do
              assert_match "hive", shell_output("#{bin}/hive --version")
            end
          end
          RUBY

          FORMULA="${FORMULA//__VERSION__/$VERSION}"
          FORMULA="${FORMULA//__SHA_ARM64__/${{ steps.hashes.outputs.arm64 }}}"
          FORMULA="${FORMULA//__SHA_X64__/${{ steps.hashes.outputs.x64 }}}"
          FORMULA="${FORMULA//__SHA_LINUX__/${{ steps.hashes.outputs.linux }}}"

          # Get current file SHA for the API update
          FILE_SHA=$(gh api repos/canderson22/homebrew-tap/contents/Formula/hive-cli.rb --jq '.sha')

          # Update the formula in the tap repo
          echo "$FORMULA" | gh api repos/canderson22/homebrew-tap/contents/Formula/hive-cli.rb \
            -X PUT \
            -f message="Update hive-cli to ${VERSION}" \
            -f content="$(echo "$FORMULA" | base64 -w0)" \
            -f sha="$FILE_SHA"
