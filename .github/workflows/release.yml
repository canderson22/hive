name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno test --allow-env --allow-read --allow-write --allow-run

  build:
    needs: test
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: hive-darwin-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: hive-darwin-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: hive-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Compile
        run: deno compile --allow-env --allow-read --allow-write --allow-run --allow-net --target ${{ matrix.target }} --output ${{ matrix.artifact }} cli.ts
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hive-darwin-arm64
            hive-darwin-x64
            hive-linux-x64
          generate_release_notes: true
